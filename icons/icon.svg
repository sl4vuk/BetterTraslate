<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Left Chinese character 文 -->
  <g stroke="#b0b0b0" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top horizontal stroke -->
    <line x1="9" y1="14" x2="33" y2="14" stroke-width="4.5"/>
    <!-- Vertical center -->
    <line x1="21" y1="10" x2="21" y2="20" stroke-width="4.5"/>
    <!-- Middle left horizontal -->
    <line x1="9" y1="26" x2="18" y2="26" stroke-width="4.5"/>
    <!-- Bottom left angled strokes -->
    <line x1="14" y1="22" x2="7"  y2="38" stroke-width="4.5"/>
    <line x1="14" y1="22" x2="21" y2="38" stroke-width="4.5"/>
    <!-- Bottom right angled strokes -->
    <line x1="26" y1="22" x2="19" y2="38" stroke-width="4.5"/>
    <line x1="26" y1="22" x2="33" y2="38" stroke-width="4.5"/>
  </g>
  <!-- Right "A" letter -->
  <g stroke="#b0b0b0" stroke-linecap="round" stroke-linejoin="round">
    <line x1="36" y1="54" x2="50" y2="24" stroke-width="4.5"/>
    <line x1="50" y1="24" x2="64" y2="54" stroke-width="4.5"/>
    <line x1="40" y1="44" x2="60" y2="44" stroke-width="4.5"/>
  </g>
</svg>
