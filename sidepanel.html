<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Better Translate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body class="theme-system">
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M3 5h12M9 3v2M3 10h4M3 15h4M10 9l4 6M14 9l-4 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M14 4h7M14 8h7M14 12h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <span class="logo-text">Better Translate</span>
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="themeToggle" title="Toggle theme">
          <svg class="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.8"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <svg class="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <svg class="icon-system" width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="2" y="3" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 21h8M12 17v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn" id="openSettings" title="Settings">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="1.8"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z" stroke="currentColor" stroke-width="1.8"/></svg>
        </button>
      </div>
    </header>

    <!-- Input Area -->
    <div class="input-section">
      <div class="textarea-wrapper">
        <textarea 
          id="sourceText" 
          placeholder="Enter text to translate…" 
          spellcheck="false"
          maxlength="5000"
        ></textarea>
        <div class="textarea-footer">
          <button class="footer-btn" id="copySource" title="Copy">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg>
          </button>
          <span class="char-count"><span id="charCount">0</span> / 5000</span>
          <div class="footer-actions">
            <button class="footer-btn" id="clearText" title="Clear">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Language Bar -->
    <div class="lang-bar">
      <div class="lang-select-wrapper" id="langSelectWrapper">
        <button class="lang-select-btn" id="langSelectBtn">
          <span id="selectedLangName">English</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <div class="lang-dropdown" id="langDropdown">
          <div class="lang-search-wrapper">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.8"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <input type="text" id="langSearch" placeholder="Search language…" autocomplete="off">
          </div>
          <div class="lang-list" id="langList"></div>
        </div>
      </div>
      <button class="translate-btn" id="translateBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 5h12M9 3v2M3 10h4M3 15h4M10 9l4 6M14 9l-4 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M18 9l3 3-3 3M15 12h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Translate
      </button>
    </div>

    <!-- Results -->
    <div class="results-section" id="resultsSection">
      <!-- Google Translate Result -->
      <div class="service-card" id="googleCard">
        <div class="service-header" id="googleHeader">
          <div class="service-info">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10Z" stroke="currentColor" stroke-width="1.8"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10A15.3 15.3 0 0 1 8 12a15.3 15.3 0 0 1 4-10Z" stroke="currentColor" stroke-width="1.8"/></svg>
            <span class="service-name">Google Translate</span>
          </div>
          <div class="service-actions">
            <div class="loading-spinner" id="googleSpinner"></div>
            <button class="icon-btn sm" id="googleRetry" title="Retry" style="display:none">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M3 3v5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="icon-btn sm" id="googleCopy" title="Copy translation" style="display:none">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg>
            </button>
            <button class="chevron-btn" id="googleChevron">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
        <div class="service-body" id="googleBody">
          <div class="translation-text" id="googleTranslation"></div>
          <div class="candidates-section" id="googleCandidates"></div>
          <div class="translation-footer">
            <span class="detected-lang" id="googleDetectedLang"></span>
            <button class="copy-result-btn" id="googleCopyResult" style="display:none">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg>
              Copy
            </button>
          </div>
        </div>
      </div>

      <!-- Microsoft Translate Result -->
      <div class="service-card" id="microsoftCard">
        <div class="service-header" id="microsoftHeader">
          <div class="service-info">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="13" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="13" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.8"/></svg>
            <span class="service-name">Microsoft Translate</span>
          </div>
          <div class="service-actions">
            <div class="loading-spinner" id="microsoftSpinner"></div>
            <button class="icon-btn sm" id="microsoftRetry" title="Retry" style="display:none">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M3 3v5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="icon-btn sm" id="microsoftCopy" title="Copy translation" style="display:none">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg>
            </button>
            <button class="chevron-btn" id="microsoftChevron">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
          </div>
        </div>
        <div class="service-body" id="microsoftBody">
          <div class="translation-text" id="microsoftTranslation"></div>
          <div class="translation-footer">
            <span class="detected-lang" id="microsoftDetectedLang"></span>
            <button class="copy-result-btn" id="microsoftCopyResult" style="display:none">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg>
              Copy
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" opacity="0.3"><path d="M3 5h12M9 3v2M3 10h4M3 15h4M10 9l4 6M14 9l-4 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M14 4h7M14 8h7M14 12h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <p>Enter text and click Translate</p>
      <span>or use <kbd>Alt+S</kbd> to open</span>
    </div>
  </div>

  <!-- Language Dropdown Overlay -->
  <div class="dropdown-overlay" id="dropdownOverlay"></div>

  <script src="languages.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
