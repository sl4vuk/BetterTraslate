<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Better Translate</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body class="theme-system">
<div class="app">
  <header class="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 64 64" fill="none" class="logo-icon">
        <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="5"><line x1="9" y1="14" x2="33" y2="14"/><line x1="21" y1="10" x2="21" y2="20"/><line x1="9" y1="26" x2="18" y2="26"/><line x1="14" y1="22" x2="7" y2="38"/><line x1="14" y1="22" x2="21" y2="38"/><line x1="26" y1="22" x2="19" y2="38"/><line x1="26" y1="22" x2="33" y2="38"/></g>
        <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="5"><line x1="36" y1="54" x2="50" y2="24"/><line x1="50" y1="24" x2="63" y2="54"/><line x1="40" y1="44" x2="60" y2="44"/></g>
      </svg>
      <span class="logo-text">Better Translate</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="autoTranslateToggle" title="Auto-translate">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8Z" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="icon-btn" id="themeToggle" title="Toggle theme">
        <svg class="icon-sun"    width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.8"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <svg class="icon-moon"   width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <svg class="icon-system" width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="2" y="3" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M8 21h8M12 17v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <button class="icon-btn" id="openSettings" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z" stroke="currentColor" stroke-width="1.8"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z" stroke="currentColor" stroke-width="1.8"/></svg>
      </button>
    </div>
  </header>

  <div class="input-section">
    <textarea id="sourceText" placeholder="Enter text to translate…" spellcheck="false"></textarea>
    <div class="textarea-footer">
      <button class="footer-btn" id="copySource" title="Copy text">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg>
      </button>
      <span class="char-count"><span id="charCount">0</span> / <span id="charLimit">5000</span></span>
      <button class="footer-btn" id="clearText" title="Clear">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <div class="lang-bar">
    <div class="lang-select-wrapper">
      <button class="lang-select-btn" id="langSelectBtn">
        <span id="selectedLangName">English</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="lang-dropdown" id="langDropdown">
        <div class="lang-search-wrapper">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.8"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          <input type="text" id="langSearch" placeholder="Search language…" autocomplete="off">
        </div>
        <div class="lang-list" id="langList"></div>
      </div>
    </div>
    <button class="translate-btn" id="translateBtn">
      <svg width="14" height="14" viewBox="0 0 64 64" fill="none"><g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="5.5"><line x1="9" y1="14" x2="33" y2="14"/><line x1="21" y1="10" x2="21" y2="20"/><line x1="9" y1="26" x2="18" y2="26"/><line x1="14" y1="22" x2="7" y2="38"/><line x1="14" y1="22" x2="21" y2="38"/><line x1="26" y1="22" x2="19" y2="38"/><line x1="26" y1="22" x2="33" y2="38"/></g><g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="5.5"><line x1="36" y1="54" x2="50" y2="24"/><line x1="50" y1="24" x2="63" y2="54"/><line x1="40" y1="44" x2="60" y2="44"/></g></svg>
      Translate
    </button>
  </div>

  <div class="results-section" id="resultsSection">
    <!-- Google -->
    <div class="service-card" id="card-google" data-service="google">
      <div class="service-header"><div class="service-info"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10Z" stroke="currentColor" stroke-width="1.8"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10A15.3 15.3 0 0 1 8 12a15.3 15.3 0 0 1 4-10Z" stroke="currentColor" stroke-width="1.8"/></svg><span class="service-name">Google Translate</span></div><div class="service-actions"><div class="loading-spinner" id="spinner-google"></div><button class="icon-btn sm retry-btn" data-service="google" style="display:none" title="Retry"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M3 3v5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button><button class="icon-btn sm copy-btn" data-service="google" style="display:none" title="Copy"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg></button><button class="chevron-btn" data-service="google"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button></div></div>
      <div class="service-body" id="body-google"><div class="translation-text" id="trans-google"></div><div class="candidates-section" id="candidates-google"></div><div class="translation-footer"><span class="detected-lang" id="detected-google"></span><button class="copy-result-btn" id="copyresult-google" style="display:none"><svg width="11" height="11" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg>Copy</button></div></div>
    </div>
    <!-- Microsoft -->
    <div class="service-card" id="card-microsoft" data-service="microsoft" style="display:none">
      <div class="service-header"><div class="service-info"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="3" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="3" y="13" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="13" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.8"/></svg><span class="service-name">Microsoft Translate</span></div><div class="service-actions"><div class="loading-spinner" id="spinner-microsoft"></div><button class="icon-btn sm retry-btn" data-service="microsoft" style="display:none" title="Retry"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M3 3v5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button><button class="icon-btn sm copy-btn" data-service="microsoft" style="display:none" title="Copy"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg></button><button class="chevron-btn" data-service="microsoft"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button></div></div>
      <div class="service-body" id="body-microsoft"><div class="translation-text" id="trans-microsoft"></div><div class="translation-footer"><span class="detected-lang" id="detected-microsoft"></span><button class="copy-result-btn" id="copyresult-microsoft" style="display:none"><svg width="11" height="11" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg>Copy</button></div></div>
    </div>
    <!-- DeepL -->
    <div class="service-card" id="card-deepl" data-service="deepl" style="display:none">
      <div class="service-header"><div class="service-info"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span class="service-name">DeepL</span></div><div class="service-actions"><div class="loading-spinner" id="spinner-deepl"></div><button class="icon-btn sm retry-btn" data-service="deepl" style="display:none" title="Retry"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M3 3v5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button><button class="icon-btn sm copy-btn" data-service="deepl" style="display:none" title="Copy"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg></button><button class="chevron-btn" data-service="deepl"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button></div></div>
      <div class="service-body" id="body-deepl"><div class="translation-text" id="trans-deepl"></div><div class="translation-footer"><span class="detected-lang" id="detected-deepl"></span><button class="copy-result-btn" id="copyresult-deepl" style="display:none"><svg width="11" height="11" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg>Copy</button></div></div>
    </div>
    <!-- Yandex -->
    <div class="service-card" id="card-yandex" data-service="yandex" style="display:none">
      <div class="service-header"><div class="service-info"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/><path d="M9 7h3.5a3.5 3.5 0 0 1 0 7H11v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M11 14l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span class="service-name">Yandex Translate</span></div><div class="service-actions"><div class="loading-spinner" id="spinner-yandex"></div><button class="icon-btn sm retry-btn" data-service="yandex" style="display:none" title="Retry"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M3 3v5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button><button class="icon-btn sm copy-btn" data-service="yandex" style="display:none" title="Copy"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg></button><button class="chevron-btn" data-service="yandex"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button></div></div>
      <div class="service-body" id="body-yandex"><div class="translation-text" id="trans-yandex"></div><div class="translation-footer"><span class="detected-lang" id="detected-yandex"></span><button class="copy-result-btn" id="copyresult-yandex" style="display:none"><svg width="11" height="11" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="1.8"/></svg>Copy</button></div></div>
    </div>
  </div>

  <div class="empty-state" id="emptyState">
    <svg width="34" height="34" viewBox="0 0 64 64" fill="none" opacity="0.25"><g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="5"><line x1="9" y1="14" x2="33" y2="14"/><line x1="21" y1="10" x2="21" y2="20"/><line x1="9" y1="26" x2="18" y2="26"/><line x1="14" y1="22" x2="7" y2="38"/><line x1="14" y1="22" x2="21" y2="38"/><line x1="26" y1="22" x2="19" y2="38"/><line x1="26" y1="22" x2="33" y2="38"/></g><g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="5"><line x1="36" y1="54" x2="50" y2="24"/><line x1="50" y1="24" x2="63" y2="54"/><line x1="40" y1="44" x2="60" y2="44"/></g></svg>
    <p>Enter text and click Translate</p>
    <span>Press <kbd>Alt+A</kbd> to open · <kbd>Ctrl+Enter</kbd> to translate</span>
  </div>
</div>
<div class="dropdown-overlay" id="dropdownOverlay"></div>
<script src="languages.js"></script>
<script src="sidepanel.js"></script>
</body>
</html>
